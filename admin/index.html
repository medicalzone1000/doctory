<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>لوحة تحكم Doctory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- ===== Login ===== -->
<section class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-card__brand">
      <div class="login-card__logo">D</div>
      <h1>لوحة تحكم Doctory</h1>
      <p>سجّل الدخول لإدارة المنصة</p>
    </div>
    <form id="loginForm" class="login-form">
      <label class="field">
        <span>اسم المستخدم</span>
        <input class="input" id="ghRepo" required autocomplete="off" placeholder="اسم المستخدم">
      </label>
      <label class="field">
        <span>الرقم التعريفي</span>
        <input class="input" type="password" id="ghToken" required autocomplete="off" placeholder="••••••••">
      </label>
      <button class="btn btn--primary btn--block" type="submit" id="loginBtn">دخول لوحة التحكم</button>
    </form>
    <p class="login-note">🔒 بياناتك تُخزَّن في جلسة المتصفح فقط وتُمسح عند إغلاقه أو تسجيل الخروج.</p>
  </div>
</section>

<!-- ===== Admin Shell ===== -->
<div class="admin-shell" id="adminShell" hidden>
  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__logo">D</span>
      <div>
        <strong>Doctory</strong>
        <small>لوحة التحكم</small>
      </div>
    </div>
    <nav class="sidebar__nav" id="sidebarNav"></nav>
    <div class="sidebar__foot">
      <div class="session-info">
        <span id="sessionUser">—</span>
        <small id="sessionRepo">—</small>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <header class="topbar">
      <button class="topbar__burger" id="sidebarToggle" aria-label="القائمة">☰</button>
      <div class="topbar__title">إدارة المنصة</div>
      <div class="topbar__actions">
        <a href="../index.html" target="_blank" class="btn btn--ghost btn--sm">معاينة ↗</a>
      </div>
    </header>

    <main class="content" id="mainContent"></main>

    <div class="save-bar" id="saveBar">
      <span>لديك تغييرات غير منشورة</span>
      <button class="btn btn--primary" id="saveAllBtn">نشر التحديثات</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay" hidden>
  <div class="spinner"></div>
  <p>جاري التحميل...</p>
</div>

<div class="toast-box" id="toastBox"></div>

<script src="../js/data.js"></script>
<script src="js/defaults.js"></script>
<script src="js/github-api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
