<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyBrain3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="headBrain3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3c9a4"/>
      <stop offset="100%" stop-color="#dba479"/>
    </linearGradient>
    <radialGradient id="painGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#16A34A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#16A34A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="320" height="180" fill="url(#skyBrain3)"/>

  <!-- neck -->
  <rect x="146" y="130" width="36" height="50" fill="url(#headBrain3)"/>

  <!-- head: rounded skull + jaw taper, built from overlapping circle and path -->
  <circle cx="168" cy="92" r="52" fill="url(#headBrain3)"/>
  <path d="M122 100 Q124 132 150 148 Q172 160 196 148 Q214 136 216 110 L210 108 Q204 134 184 144 Q164 152 146 140 Q130 128 128 102 Z" fill="url(#headBrain3)"/>

  <!-- ear -->
  <ellipse cx="120" cy="98" rx="9" ry="13" fill="#dba479" stroke="#c98f63" stroke-width="1.2"/>

  <!-- hair cap -->
  <path d="M120 64 Q140 36 172 36 Q206 36 220 64 Q222 78 216 88 Q210 60 180 50 Q150 42 128 58 Q120 64 120 64 Z" fill="#1B3A6B"/>

  <!-- pain glow over temple -->
  <ellipse cx="184" cy="78" rx="38" ry="32" fill="url(#painGlow3)"/>

  <!-- pulse bolt -->
  <path d="M186 58 L176 80 L188 80 L178 102" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- EEG strip accent -->
  <path d="M28 150 H62 L72 130 L84 160 L94 142 L102 150 H136" fill="none" stroke="#16A34A" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <path d="M28 162 H136" stroke="#16A34A" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <rect width="320" height="180" fill="#102A4C" opacity="0.04"/>
</svg>
