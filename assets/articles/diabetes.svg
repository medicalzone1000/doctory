<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skySugar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#ffe4e6"/>
    </linearGradient>
    <linearGradient id="handSugar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3c9a4"/>
      <stop offset="100%" stop-color="#dba479"/>
    </linearGradient>
    <linearGradient id="deviceSugar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde3f0"/>
    </linearGradient>
  </defs>

  <rect width="320" height="180" fill="url(#skySugar)"/>

  <!-- palm holding device, bottom of frame -->
  <path d="M40 180 Q40 140 70 132 Q150 110 230 132 Q270 144 280 180 Z" fill="url(#handSugar)"/>
  <path d="M70 132 Q60 110 78 100 Q90 94 96 108 Q100 118 96 132" fill="url(#handSugar)" stroke="#dba479" stroke-width="1"/>

  <!-- glucose meter device -->
  <rect x="108" y="78" width="92" height="58" rx="10" fill="url(#deviceSugar)" stroke="#c7cee0" stroke-width="1.5"/>
  <rect x="120" y="90" width="68" height="26" rx="4" fill="#102A4C"/>
  <text x="154" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0EA5A4">98</text>
  <circle cx="186" cy="126" r="5" fill="#E11D48"/>
  <circle cx="170" cy="126" r="5" fill="#dde3f0"/>
  <circle cx="154" cy="126" r="5" fill="#dde3f0"/>

  <!-- test strip -->
  <rect x="196" y="60" width="10" height="34" rx="3" fill="#ffffff" stroke="#c7cee0" stroke-width="1" transform="rotate(18 201 77)"/>

  <!-- blood drop accent -->
  <path d="M252 44 C 240 62, 226 76, 226 90 C 226 104, 238 114, 252 114 C 266 114, 278 104, 278 90 C 278 76, 264 62, 252 44 Z" fill="#E11D48" opacity="0.85"/>
  <ellipse cx="244" cy="92" rx="5" ry="8" fill="#ffffff" opacity="0.3"/>

  <rect width="320" height="180" fill="#102A4C" opacity="0.04"/>
</svg>
